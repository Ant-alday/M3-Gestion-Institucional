server.port=8083
spring.application.name=servicio-gestion-institucional

# --- Base de datos ---
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/db_gestion?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:juan123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Eureka ---
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.enabled=false

# --- Logging ---
logging.level.com.ayuntamiento=DEBUG
